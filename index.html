<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWF Study Guide 2026 — Sustainability Programs in Switzerland</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;color:#333}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.header{background:#2d4a27;padding:0}
.header-nav{max-width:1200px;margin:0 auto;padding:20px 32px;display:flex;align-items:center;gap:24px}
.logo-img{height:50px}
.nav-links{display:flex;gap:24px;margin-left:auto}
.nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#fff}
.header-hero{background:#7d9b78;padding:48px 32px 52px}
.header-hero-inner{max-width:1200px;margin:0 auto}
.header-hero h1{font-size:clamp(28px,4vw,44px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px}
.header-hero p{font-size:16px;color:rgba(255,255,255,.85);max-width:650px;line-height:1.6;font-weight:400}
.filters-wrap{max-width:1200px;margin:-24px auto 0;padding:0 24px;position:relative;z-index:10}
.filters-card{background:#fff;border-radius:8px;padding:24px 28px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.search-input{width:100%;padding:12px 16px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:'Montserrat',sans-serif;outline:none;transition:border-color .2s;background:#fafafa;margin-bottom:20px}
.search-input:focus{border-color:#2d4a27;background:#fff}
.search-input::placeholder{color:#aaa}
.filters-row{display:flex;gap:14px;flex-wrap:wrap}
.filter-group{flex:1 1 180px;min-width:150px}
.filter-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#2d4a27;margin-bottom:5px}
.filter-select{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:'Montserrat',sans-serif;background:#fff;color:#333;cursor:pointer;outline:none;transition:border-color .2s}
.filter-select:focus{border-color:#2d4a27}
.filter-actions{margin-top:14px;display:flex;align-items:center;gap:12px}
.filter-actions span{font-size:13px;color:#888}
.btn-clear{background:#2d4a27;border:none;border-radius:4px;padding:5px 14px;font-size:12px;color:#fff;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;transition:background .2s}
.btn-clear:hover{background:#1e3319}
.results-wrap{max-width:1200px;margin:24px auto 0;padding:0 24px 60px}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.results-count{font-size:14px;font-weight:600;color:#666}
.results-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;white-space:nowrap}
.badge-bachelor{background:#6b8f5e;color:#fff}
.badge-minor{background:#8aaa7e;color:#fff}
.badge-master{background:#4a6e3f;color:#fff}
.badge-weiterbildung{background:#a0b89a;color:#333}
.programs-list{display:flex;flex-direction:column;gap:10px}
.program-card{background:#fff;border-radius:6px;border:1px solid #e0e0d8;overflow:hidden;transition:box-shadow .2s,transform .15s;cursor:pointer}
.program-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.card-inner{padding:18px 22px}
.border-bachelor{border-left:4px solid #6b8f5e}
.border-minor{border-left:4px solid #8aaa7e}
.border-master{border-left:4px solid #4a6e3f}
.border-weiterbildung{border-left:4px solid #a0b89a}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.card-main{flex:1;min-width:200px}
.card-title{margin:0 0 6px;font-size:15px;font-weight:700;color:#2a2a2a;line-height:1.35}
.card-uni-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-uni{font-size:13px;font-weight:600;color:#2d4a27}
.type-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600}
.type-uni{background:#eee8f5;color:#6b4f8a}
.type-fh{background:#e5f0fa;color:#3a6d9e}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
.tag-level{font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;white-space:nowrap}
.tag-lang{font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;background:#f0f0ea;color:#666;white-space:nowrap}
.card-discs{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.disc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#f0f4ee;color:#5a7d4f}
.card-details{margin-top:14px;padding-top:14px;border-top:1px solid #eee;animation:fadeIn .25s ease}
.card-desc{margin:0 0 10px;font-size:13px;line-height:1.65;color:#444}
.card-pract{background:#f8f8f4;border-radius:4px;padding:10px 14px;border:1px solid #e8e8e0}
.card-pract-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999}
.card-pract p{margin:4px 0 0;font-size:12px;color:#555;line-height:1.5}
.card-hint{text-align:right;margin-top:6px;font-size:11px;color:#bbb}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty .ico{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px}
.loading{text-align:center;padding:80px 20px}
.loading .spinner{width:36px;height:36px;border:3px solid #e0e0d8;border-top-color:#2d4a27;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.loading p{font-size:14px;color:#2d4a27;font-weight:500}
.loading .sub{font-size:12px;color:#aaa;margin-top:4px}
.error-box{max-width:550px;margin:40px auto;padding:24px;background:#fff;border:1px solid #e0e0d8;border-radius:6px;text-align:center}
.error-box h3{color:#c0392b;margin-bottom:8px;font-size:16px}
.error-box p{font-size:13px;color:#666;line-height:1.6;margin-top:6px}
.footer{background:#4a4a40;padding:20px 32px;text-align:center}
.footer p{font-size:12px;color:rgba(255,255,255,.45)}
.footer a{color:rgba(255,255,255,.65)}
.multi-select{position:relative}
.multi-btn{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:'Montserrat',sans-serif;background:#fff;color:#333;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}
.multi-btn:focus{border-color:#2d4a27;outline:none}
.multi-btn .arrow{font-size:10px;color:#999}
.multi-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 4px 4px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.multi-dropdown.open{display:block}
.multi-dropdown label{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.multi-dropdown label:hover{background:#f5f5f0}
.multi-dropdown input[type="checkbox"]{accent-color:#2d4a27}
@media(max-width:600px){
  .header-hero{padding:32px 20px 36px}
  .header-nav{padding:12px 20px}
  .nav-links{display:none}
  .filters-wrap,.results-wrap{padding:0 12px}
  .filters-card{padding:16px}
  .card-inner{padding:14px}
  .filter-group{flex:1 1 100%}
  .results-wrap{padding-bottom:40px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-nav">
    <img class="logo-img" src="https://static.wixstatic.com/media/e9061f_4ac00305344143a4a63c3c5f61bc17e7~mv2.png/v1/crop/x_49,y_125,w_362,h_223/fill/w_194,h_118,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/logo%20he-sustainability.png" alt="HE Sustainability">
    <div class="nav-links">
      <a href="https://www.he-sustainability.ch/">Home</a>
      <a href="#" class="active">Study Guide</a>
      <a href="https://www.he-sustainability.ch/about">About</a>
    </div>
  </div>
</div>

<div class="header-hero">
  <div class="header-hero-inner">
    <h1>Study Guide 2026</h1>
    <p>Sustainability-focused Bachelor, Master and Continuing Education Programs in Switzerland</p>
  </div>
</div>

<div class="filters-wrap">
  <div class="filters-card">
    <input type="text" id="search" class="search-input" placeholder="Search programs, universities, or topics...">
    <div class="filters-row">
      <div class="filter-group"><label class="filter-label">Level</label><select id="fLevel" class="filter-select"><option value="">All</option></select></div>
      <div class="filter-group"><label class="filter-label">Discipline</label><div class="multi-select" id="msDisc"><button type="button" class="multi-btn" onclick="toggleDrop('msDisc')"><span id="msDiscLabel">All</span><span class="arrow">&#9660;</span></button><div class="multi-dropdown" id="msDiscDrop"></div></div></div>
      <div class="filter-group"><label class="filter-label">University Type</label><select id="fType" class="filter-select"><option value="">All</option></select></div>
      <div class="filter-group"><label class="filter-label">Region</label><select id="fRegion" class="filter-select"><option value="">All</option></select></div>
      <div class="filter-group"><label class="filter-label">Language</label><div class="multi-select" id="msLang"><button type="button" class="multi-btn" onclick="toggleDrop('msLang')"><span id="msLangLabel">All</span><span class="arrow">&#9660;</span></button><div class="multi-dropdown" id="msLangDrop"></div></div></div>
    </div>
    <div class="filter-actions" id="fActions" style="display:none">
      <span id="fCount"></span>
      <button class="btn-clear" onclick="clearAll()">Clear all</button>
    </div>
  </div>
</div>

<div class="results-wrap">
  <div class="results-bar">
    <span class="results-count" id="rCount"></span>
    <div class="results-badges" id="rBadges"></div>
  </div>
  <div class="programs-list" id="list">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading programs...</p>
      <p class="sub">Fetching data from OneDrive</p>
    </div>
  </div>
</div>

<div class="footer">
  <p>&copy; WWF Switzerland 2026 &middot; <a href="https://www.he-sustainability.ch/">he-sustainability.ch</a> &middot; This is a prototype</p>
</div>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
/* ── CONFIG ── */
var ONEDRIVE_URL  = 'https://1drv.ms/x/c/6c8a03026aaff695/IQRxORU20DhFTJ1vnmxpO4D_AWUr6dLSuSWDEBUFfTh0r68';
var SHEET_NAME    = 'Study Programs'; // sheet tab name ('' = first sheet)

/* CORS proxies tried in order until one works */
var PROXIES = [
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u){ return 'https://thingproxy.freeboard.io/fetch/' + u; }
];

var DL = {Econ:"Economic Sciences",NatSci:"Natural & Environmental Sciences",SocSci:"Social Sciences",EngSci:"Engineering Sciences",ArtDes:"Arts & Design",ComSci:"Computer Science",EdProf:"Education & Pedagogy"};
var LS = {
  Bachelor:        {b:"badge-bachelor",c:"border-bachelor",bg:"#e8f0e5",fg:"#3a5e30"},
  "Bachelor Minor":{b:"badge-minor",c:"border-minor",bg:"#eef3ec",fg:"#4a6e3f"},
  Master:          {b:"badge-master",c:"border-master",bg:"#e5eee2",fg:"#2d5227"},
  Weiterbildung:   {b:"badge-weiterbildung",c:"border-weiterbildung",bg:"#f0efe8",fg:"#5a5a4a"}
};

var DATA = [], exp = {};
function $(id){ return document.getElementById(id); }

/* ── Try each proxy in sequence ── */
function fetchData() {
  tryProxy(0);
}

function tryProxy(idx) {
  if (idx >= PROXIES.length) {
    showError('All proxies failed. Make sure the OneDrive file is shared as "Anyone with the link can view".');
    return;
  }
  var proxyUrl = PROXIES[idx](ONEDRIVE_URL);
  fetch(proxyUrl)
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.arrayBuffer();
    })
    .then(function(buf) {
      /* Check we got binary data, not an HTML error page */
      var bytes = new Uint8Array(buf, 0, 4);
      /* XLSX magic: PK (50 4B), or CFB (D0 CF) */
      var isPK  = bytes[0]===0x50 && bytes[1]===0x4B;
      var isCFB = bytes[0]===0xD0 && bytes[1]===0xCF;
      if (!isPK && !isCFB) throw new Error('Not an Excel file — proxy returned HTML');
      parseBuffer(buf);
    })
    .catch(function() {
      tryProxy(idx + 1); // try next proxy
    });
}

function parseBuffer(buf) {
  var wb = XLSX.read(buf, { type: 'array' });
  var wsName = (SHEET_NAME && wb.SheetNames.indexOf(SHEET_NAME) >= 0)
               ? SHEET_NAME : wb.SheetNames[0];
  var rows = XLSX.utils.sheet_to_json(wb.Sheets[wsName], { defval: '' });
  if (!rows.length) { showError('Sheet "' + wsName + '" is empty.'); return; }

  var keys = Object.keys(rows[0]);
  function col(kws) {
    for (var i=0;i<keys.length;i++){var k=keys[i].toLowerCase();for(var j=0;j<kws.length;j++)if(k.indexOf(kws[j])>=0)return keys[i];}
    return null;
  }
  var kP  = col(['program'])                          || keys[0];
  var kU  = col(['university','institution','school']) || keys[1];
  var kT  = col(['type'])                             || keys[2];
  var kL  = col(['level'])                            || keys[3];
  var kD  = col(['discipline','main'])                || keys[4];
  var kG  = col(['language','lang'])                  || keys[5];
  var kDe = col(['description','desc'])               || keys[6];
  var kPr = col(['practical','info'])                 || keys[7];
  var kR  = col(['region'])                           || keys[8];

  DATA = [];
  rows.forEach(function(r){
    var name = String(r[kP]||'').trim();
    if (!name || name==='Program') return;
    DATA.push({n:name,u:String(r[kU]||'').trim(),t:String(r[kT]||'').trim(),
               l:String(r[kL]||'').trim(),d:String(r[kD]||'').trim(),
               g:String(r[kG]||'').trim(),desc:String(r[kDe]||'').trim(),
               p:String(r[kPr]||'').trim(),reg:String(r[kR]||'').trim()});
  });

  if (!DATA.length) { showError('No data rows found. Check the sheet name and column headers.'); return; }
  populateFilters();
  render();
}

function showError(msg){
  $('list').innerHTML='<div class="error-box"><h3>⚠️ Could not load data</h3><p>'+msg+'</p><p>Make sure the OneDrive file has <strong>"Anyone with the link"</strong> access.</p></div>';
}

function uniq(a){var s={},r=[];a.forEach(function(v){if(v&&!s[v]){s[v]=1;r.push(v);}});return r.sort();}
function fill(id,opts){var s=$(id);while(s.options.length>1)s.remove(1);opts.forEach(function(v){var o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});}
function splitTrim(str){return str.split(',').map(function(s){return s.trim();}).filter(Boolean);}

function populateFilters(){
  var lv=[],di=[],ty=[],la=[],re=[];
  DATA.forEach(function(x){
    lv.push(x.l);ty.push(x.t);if(x.reg)re.push(x.reg);
    splitTrim(x.d).forEach(function(v){di.push(v);});
    splitTrim(x.g).forEach(function(v){la.push(v);});
  });
  fill('fLevel',uniq(lv));fill('fType',uniq(ty));fill('fRegion',uniq(re));
  fillMulti('msDiscDrop',uniq(di),'disc');fillMulti('msLangDrop',uniq(la),'lang');
}

function getF(){return{level:$('fLevel').value,type:$('fType').value,region:$('fRegion').value,q:$('search').value.toLowerCase(),discs:getChecked('disc'),langs:getChecked('lang')};}

function doFilter(){
  var f=getF(),r=[];
  DATA.forEach(function(x){
    if(f.level&&x.l!==f.level)return;
    if(f.type&&x.t!==f.type)return;
    if(f.region&&x.reg!==f.region)return;
    if(f.discs.length){var xd=splitTrim(x.d);if(!f.discs.some(function(v){return xd.indexOf(v)>=0;}))return;}
    if(f.langs.length){var xl=splitTrim(x.g);if(!f.langs.some(function(v){return xl.indexOf(v)>=0;}))return;}
    if(f.q&&x.n.toLowerCase().indexOf(f.q)<0&&x.u.toLowerCase().indexOf(f.q)<0&&x.desc.toLowerCase().indexOf(f.q)<0)return;
    r.push(x);
  });
  return r;
}

function fillMulti(cId,opts,name){
  var h='';
  opts.forEach(function(v){h+='<label><input type="checkbox" name="'+name+'" value="'+v+'" onchange="onMultiChange(\''+name+'\')"> '+(DL[v]||v)+'</label>';});
  $(cId).innerHTML=h;
}
function getChecked(name){return Array.from(document.querySelectorAll('input[name="'+name+'"]:checked')).map(function(b){return b.value;});}
function onMultiChange(name){
  var v=getChecked(name),lid=name==='disc'?'msDiscLabel':'msLangLabel';
  $(lid).textContent=v.length===0?'All':v.length===1?(DL[v[0]]||v[0]):v.length+' selected';
  render();
}
function toggleDrop(id){
  var d=$(id).querySelector('.multi-dropdown'),o=d.classList.contains('open');
  document.querySelectorAll('.multi-dropdown').forEach(function(el){el.classList.remove('open');});
  if(!o)d.classList.add('open');
}
document.addEventListener('click',function(e){if(!e.target.closest('.multi-select'))document.querySelectorAll('.multi-dropdown').forEach(function(el){el.classList.remove('open');});});
function clearAll(){
  ['fLevel','fType','fRegion','search'].forEach(function(id){$(id).value='';});
  document.querySelectorAll('input[type="checkbox"]').forEach(function(b){b.checked=false;});
  $('msDiscLabel').textContent='All';$('msLangLabel').textContent='All';exp={};render();
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  var r=doFilter(),f=getF(),ac=0;
  if(f.level)ac++;if(f.discs.length)ac++;if(f.type)ac++;if(f.langs.length)ac++;if(f.region)ac++;
  var fa=$('fActions');
  if(ac>0){fa.style.display='flex';$('fCount').textContent=ac+' filter'+(ac>1?'s':'')+' active';}else fa.style.display='none';
  $('rCount').textContent=r.length+' program'+(r.length!==1?'s':'')+' found';
  var bh='';
  ['Bachelor','Bachelor Minor','Master','Weiterbildung'].forEach(function(lv){
    var st=LS[lv],cnt=r.filter(function(x){return x.l===lv;}).length;
    if(cnt)bh+='<span class="badge '+st.b+'">'+lv+': '+cnt+'</span>';
  });
  $('rBadges').innerHTML=bh;
  if(!r.length){$('list').innerHTML='<div class="empty"><div class="ico">🌱</div><h3>No programs found</h3><p>Try adjusting your filters</p></div>';return;}
  var html='';
  r.forEach(function(x){
    var idx=DATA.indexOf(x),s=LS[x.l]||LS.Bachelor,o=!!exp[idx];
    var dh=splitTrim(x.d).map(function(d){return'<span class="disc-tag">'+esc(DL[d]||d)+'</span>';}).join('');
    var det='';
    if(o){det='<div class="card-details"><p class="card-desc">'+esc(x.desc)+'</p>'+(x.p?'<div class="card-pract"><span class="card-pract-lbl">Practical Information</span><p>'+esc(x.p)+'</p></div>':'')+'</div>';}
    var isUni=x.t.toLowerCase().indexOf('uni')>=0;
    html+='<div class="program-card" onclick="tog('+idx+')"><div class="card-inner '+s.c+'">'
      +'<div class="card-top"><div class="card-main"><h3 class="card-title">'+esc(x.n)+'</h3>'
      +'<div class="card-uni-row"><span class="card-uni">'+esc(x.u)+'</span>'
      +'<span class="type-badge '+(isUni?'type-uni':'type-fh')+'">'+esc(x.t)+'</span></div></div>'
      +'<div class="card-tags"><span class="tag-level" style="background:'+s.bg+';color:'+s.fg+'">'+esc(x.l)+'</span>'
      +'<span class="tag-lang">'+esc(x.g)+'</span></div></div>'
      +'<div class="card-discs">'+dh+'</div>'+det
      +'<div class="card-hint">'+(o?'&#9650; Click to collapse':'&#9660; Click for details')+'</div>'
      +'</div></div>';
  });
  $('list').innerHTML=html;
}

function tog(i){exp[i]=!exp[i];render();}
document.querySelectorAll('.filter-select').forEach(function(s){s.addEventListener('change',render);});
$('search').addEventListener('input',render);
fetchData();
</script>
</body>
</html>
