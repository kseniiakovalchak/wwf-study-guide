<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel — просмотр</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #1e6b3c;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header span.icon {
            font-size: 1.4rem;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            flex: 1;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .excel-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.09);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .excel-card h2 {
            font-size: 1rem;
            color: #555;
            font-weight: 500;
        }

        .excel-card iframe {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            display: block;
        }

        .open-link {
            background: #1e6b3c;
            color: white;
            padding: 9px 22px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .open-link:hover {
            background: #155230;
        }

        footer {
            background: #2c3e50;
            color: #95a5a6;
            text-align: center;
            padding: 14px;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

    <header>
        <span class="icon">📊</span>
        <h1>Viewing an Excel file</h1>
    </header>

    <div class="container">
        <div class="excel-card">
            <h2>Study Programs</h2>

            <iframe
                width="402"
                height="346"
                frameborder="0"
                scrolling="no"
                src="https://1drv.ms/x/c/6c8a03026aaff695/IQRxORU20DhFTJ1vnmxpO4D_AWUr6dLSuSWDEBUFfTh0r68?em=2&wdAllowInteractivity=False&ActiveCell='Study%20Programs'!A2&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True&wdInConfigurator=True">
            </iframe>

            <a class="open-link"
               href="https://1drv.ms/x/c/6c8a03026aaff695/IQRxORU20DhFTJ1vnmxpO4D_AWUr6dLSuSWDEBUFfTh0r68"
               target="_blank">
                ↗ Открыть в OneDrive
            </a>
        </div>
    </div>

    <footer>
        <p>View via Microsoft Office Excel Web App &nbsp;|&nbsp; &copy; 2026</p>
    </footer>

</body>
</html>
