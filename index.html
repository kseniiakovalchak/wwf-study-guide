<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWF Study Guide 2026 — Sustainability Programs in Switzerland</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',-apple-system,sans-serif;background:#f5f5f0;min-height:100vh;color:#333}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

.header{background:#2d4a27;padding:0}
.header-nav{max-width:1200px;margin:0 auto;padding:20px 32px;display:flex;align-items:center;gap:24px}
.logo-img{height:50px}
.nav-links{display:flex;gap:24px;margin-left:auto}
.nav-links a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#fff}

.header-hero{background:#7d9b78;padding:48px 32px 52px}
.header-hero-inner{max-width:1200px;margin:0 auto}
.header-hero h1{font-size:clamp(28px,4vw,44px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px}
.header-hero p{font-size:16px;color:rgba(255,255,255,.85);max-width:650px;line-height:1.6;font-weight:400}

.filters-wrap{max-width:1200px;margin:-24px auto 0;padding:0 24px;position:relative;z-index:10}
.filters-card{background:#fff;border-radius:8px;padding:24px 28px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.search-input{width:100%;padding:12px 16px;border:1px solid #ccc;border-radius:4px;font-size:15px;font-family:'Montserrat',sans-serif;outline:none;transition:border-color .2s;background:#fafafa;margin-bottom:20px}
.search-input:focus{border-color:#2d4a27;background:#fff}
.search-input::placeholder{color:#aaa}
.filters-row{display:flex;gap:14px;flex-wrap:wrap}
.filter-group{flex:1 1 180px;min-width:150px}
.filter-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#2d4a27;margin-bottom:5px}
.filter-select{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:'Montserrat',sans-serif;background:#fff;color:#333;cursor:pointer;outline:none;transition:border-color .2s}
.filter-select:focus{border-color:#2d4a27}
.filter-actions{margin-top:14px;display:flex;align-items:center;gap:12px}
.filter-actions span{font-size:13px;color:#888}
.btn-clear{background:#2d4a27;border:none;border-radius:4px;padding:5px 14px;font-size:12px;color:#fff;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:600;transition:background .2s}
.btn-clear:hover{background:#2d4a29}

.results-wrap{max-width:1200px;margin:24px auto 0;padding:0 24px 60px}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.results-count{font-size:14px;font-weight:600;color:#666}
.results-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:3px;font-weight:600;white-space:nowrap}
.badge-bachelor{background:#6b8f5e;color:#fff}
.badge-minor{background:#8aaa7e;color:#fff}
.badge-master{background:#4a6e3f;color:#fff}
.badge-weiterbildung{background:#a0b89a;color:#333}

.programs-list{display:flex;flex-direction:column;gap:10px}

.program-card{background:#fff;border-radius:6px;border:1px solid #e0e0d8;overflow:hidden;transition:box-shadow .2s,transform .15s;cursor:pointer}
.program-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.card-inner{padding:18px 22px}
.border-bachelor{border-left:4px solid #6b8f5e}
.border-minor{border-left:4px solid #8aaa7e}
.border-master{border-left:4px solid #4a6e3f}
.border-weiterbildung{border-left:4px solid #a0b89a}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.card-main{flex:1;min-width:200px}
.card-title{margin:0 0 6px;font-size:15px;font-weight:700;color:#2a2a2a;line-height:1.35}
.card-uni-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-uni{font-size:13px;font-weight:600;color:#2d4a27}
.type-badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600}
.type-uni{background:#eee8f5;color:#6b4f8a}
.type-fh{background:#e5f0fa;color:#3a6d9e}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
.tag-level{font-size:11px;font-weight:700;padding:3px 10px;border-radius:3px;white-space:nowrap}
.tag-lang{font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;background:#f0f0ea;color:#666;white-space:nowrap}
.tag-lang-add{opacity:.55;font-weight:400}

/* Discipline + IT icons row */
.card-bottom-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:8px;flex-wrap:wrap}
.card-discs{display:flex;gap:4px;flex-wrap:wrap}
.disc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#f0f4ee;color:#5a7d4f}

/* Inter+Trans icons on card */
.it-icons{display:flex;gap:6px;align-items:center;flex-shrink:0}
.it-icon{position:relative;display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:600;cursor:help;color:#8a7d4a}
.it-icon-inter{background:#faf7ec;border:1px solid #e8e0b8}
.it-icon-pract{background:#ecf5f0;border:1px solid #b8dcc8;color:#4a7a5a}
.it-icon.level-high{font-weight:700}
.it-icon.level-high.it-icon-inter{background:#f5f0d8;border-color:#d4c88a}
.it-icon.level-high.it-icon-pract{background:#d8f0e2;border-color:#8ac8a0}
.it-icon img{height:22px;width:auto;flex-shrink:0}
.it-icon .it-lbl{display:none}
.it-icon .it-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;font-weight:500;padding:5px 10px;border-radius:4px;white-space:nowrap;z-index:50;pointer-events:none}
.it-icon .it-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#333}
.it-icon:hover .it-tip{display:block}

.card-details{margin-top:14px;padding-top:14px;border-top:1px solid #eee;animation:fadeIn .25s ease}
.card-desc{margin:0 0 10px;font-size:13px;line-height:1.65;color:#444}
.card-pract{background:#f8f8f4;border-radius:4px;padding:10px 14px;border:1px solid #e8e8e0}
.card-pract-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999}
.card-pract p{margin:4px 0 0;font-size:12px;color:#555;line-height:1.5}
.card-hint{text-align:right;margin-top:6px;font-size:11px;color:#bbb}

.empty{text-align:center;padding:60px 20px;color:#999}
.empty .ico{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;font-weight:600;margin-bottom:6px}
.empty p{font-size:13px}

.loading{text-align:center;padding:80px 20px}
.loading .spinner{width:36px;height:36px;border:3px solid #e0e0d8;border-top-color:#2d4a27;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.loading p{font-size:14px;color:#2d4a27;font-weight:500}
.loading .sub{font-size:12px;color:#aaa;margin-top:4px}

.error-box{max-width:550px;margin:40px auto;padding:24px;background:#fff;border:1px solid #e0e0d8;border-radius:6px;text-align:center}
.error-box h3{color:#c0392b;margin-bottom:8px;font-size:16px}
.error-box p{font-size:13px;color:#666;line-height:1.6}

.footer{background:#4a4a40;padding:20px 32px;text-align:center}
.footer p{font-size:12px;color:rgba(255,255,255,.45)}
.footer a{color:rgba(255,255,255,.65)}

/* Multi-select dropdown */
.multi-select{position:relative}
.multi-btn{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:'Montserrat',sans-serif;background:#fff;color:#333;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center}
.multi-btn:focus{border-color:#2d4a27;outline:none}
.multi-btn .arrow{font-size:10px;color:#999}
.multi-dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 4px 4px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.multi-dropdown.open{display:block}
.multi-dropdown label{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.multi-dropdown label:hover{background:#f5f5f0}
.multi-dropdown input[type="checkbox"]{accent-color:#2d4a27}

/* Language sub-filter */
.lang-sub{margin-top:6px;display:none}
.lang-sub.visible{display:block}
.lang-sub .filter-label{font-size:10px;color:#888;margin-bottom:3px}

@media(max-width:600px){
  .header-hero{padding:32px 20px 36px}
  .header-nav{padding:12px 20px}
  .nav-links{display:none}
  .filters-wrap,.results-wrap{padding:0 12px}
  .filters-card{padding:16px}
  .card-inner{padding:14px}
  .filter-group{flex:1 1 100%}
  .results-wrap{padding-bottom:40px}
  .it-icons{gap:4px}
  .it-icon{padding:2px 5px}
  .it-icon img{height:18px;width:auto}
  .it-icon .it-lbl{display:none}
}
</style>
</head>

<div class="header">
  <div class="header-nav">
    <img class="logo-img" src="https://static.wixstatic.com/media/e9061f_4ac00305344143a4a63c3c5f61bc17e7~mv2.png/v1/crop/x_49,y_125,w_362,h_223/fill/w_194,h_118,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/logo%20he-sustainability.png" alt="HE Sustainability">
    <div class="nav-links">

</div>

        </div>

    </div>
    <div class="filter-actions" id="fActions" style="display:none">
      <span id="fCount"></span>
      <button class="btn-clear" onclick="clearAll()">Clear all</button>
    </div>
  </div>
</div>

<div class="results-wrap">
  <div class="results-bar">

    <div class="results-badges" id="rBadges"></div>
  </div>
  <div class="programs-list" id="list">
    <div class="loading"><div class="spinner"></div><p>Loading programs...</p><p class="sub">Fetching data from Google Sheets</p></div>
  </div>
</div>

<div class="footer">
  <p>&copy; WWF Switzerland 2026 &middot; <a href="https://www.he-sustainability.ch/">he-sustainability.ch</a> &middot; This is a prototype</p>
</div>

var DATA = [], exp = {};
function $(id){return document.getElementById(id)}

// Normalize old language formats to full names
var LANG_NORM = {'D':'German','E':'English','F':'French','DE':'German','EN':'English','FR':'French','IT':'Italian','German':'German','English':'English','French':'French','Italian':'Italian'};

function parseOldLang(raw) {
  if (!raw) return {main:'',add:''};
  raw = raw.trim();
  raw = raw.replace('D/E/F','DE,EN,FR').replace('D/E','DE,EN');
  if (LANG_NORM[raw]) return {main:LANG_NORM[raw],add:''};
  var mainP=[],addP=[];
  var parens = raw.match(/\(([^)]+)\)/g);
  if (parens) for (var i=0;i<parens.length;i++) {
    var bits = parens[i].replace(/[()]/g,'').split(/[,\s]+/);
    for (var b=0;b<bits.length;b++){var n=LANG_NORM[bits[b].trim().toUpperCase()];if(n)addP.push(n);}
  }
  var clean = raw.replace(/\([^)]*\)/g,'').replace(/or only \w+/gi,'').trim();
  var parts = clean.split(/[,/]+/);
  for (var i=0;i<parts.length;i++){var n=LANG_NORM[parts[i].trim().toUpperCase()]||LANG_NORM[parts[i].trim()];if(n)mainP.push(n);}
  if (!mainP.length) return {main:raw,add:''};
  var m=mainP[0],adds=[];
  for (var i=1;i<mainP.length;i++) if(mainP[i]!==m&&adds.indexOf(mainP[i])<0) adds.push(mainP[i]);
  for (var i=0;i<addP.length;i++) if(addP[i]!==m&&adds.indexOf(addP[i])<0) adds.push(addP[i]);
  return {main:m,add:adds.join(', ')};
}

function fetchData() {
  var cb = 'handleGoogleData';
  window[cb] = function(response) {
    try {
      if (!response.table || !response.table.rows) { showError('No table data'); return; }
      var cols = [];
      for (var i=0;i<response.table.cols.length;i++) cols.push((response.table.cols[i].label||'').toLowerCase().trim());
      console.log('Columns:', cols);

      // Map columns strictly by exact header names
      var CM = {};
      for (var j=0;j<cols.length;j++) {
        var c = cols[j];
        if (c === 'program') CM.prog = j;
        else if (c === 'university type') CM.utype = j;
        else if (c === 'university') CM.uni = j;
        else if (c === 'level') CM.level = j;
        else if (c === 'discipline') CM.disc = j;
        else if (c === 'main language') CM.mainLang = j;
        else if (c === 'additional languages') CM.addLang = j;
        else if (c === 'language') CM.langOld = j;
        else if (c === 'description') CM.desc = j;
        else if (c === 'practical information') CM.pract = j;
        else if (c === 'region') CM.region = j;
        else if (c === 'interdisciplinary overview') CM.inter1 = j;
        else if (c === 'highly interdisciplinary') CM.inter2 = j;
        else if (c === 'practical inputs') CM.pract1 = j;
        else if (c === 'deeply practical') CM.pract2 = j;
      }

      // Use old 'language' column if new ones not found
      if (CM.mainLang === undefined && CM.langOld !== undefined) CM.mainLang = CM.langOld;

      // Fallback positional (for old sheet format)
      if (CM.prog === undefined) CM = {prog:0,uni:1,utype:2,level:3,disc:4,mainLang:5,desc:6,pract:7,region:8};

      console.log('Mapping:', JSON.stringify(CM));

      DATA = [];
      var rows = response.table.rows;
      var isTrue = function(v){return v&&(v==='TRUE'||v==='true'||v==='1');};

      for (var k=0;k<rows.length;k++) {
        var r = rows[k], prog = gv(r,CM.prog);
        if (!prog || prog === 'Program') continue;

        var mainLang = gv(r, CM.mainLang);
        var addLang = CM.addLang !== undefined ? gv(r, CM.addLang) : '';

        // If old format (contains comma, paren, slash) → parse
        if (!addLang && mainLang && (mainLang.indexOf(',')>=0 || mainLang.indexOf('(')>=0 || mainLang.indexOf('/')>=0)) {
          var parsed = parseOldLang(mainLang);
          mainLang = parsed.main;
          addLang = parsed.add;
        }
        // Normalize single codes to full names
        if (LANG_NORM[mainLang]) mainLang = LANG_NORM[mainLang];

        // All languages list
        var allLangs = [];
        if (mainLang) allLangs.push(mainLang);
        if (addLang) { var extras=addLang.split(','); for(var ei=0;ei<extras.length;ei++){var el=extras[ei].trim();if(el&&allLangs.indexOf(el)<0)allLangs.push(el);} }

        DATA.push({
          n:prog, u:gv(r,CM.uni), t:gv(r,CM.utype), l:gv(r,CM.level), d:gv(r,CM.disc),
          mainLang:mainLang, addLang:addLang, allLangs:allLangs,
          desc:gv(r,CM.desc), p:gv(r,CM.pract), reg:gv(r,CM.region),
          inter1:isTrue(gv(r,CM.inter1)), inter2:isTrue(gv(r,CM.inter2)),
          pract1:isTrue(gv(r,CM.pract1)), pract2:isTrue(gv(r,CM.pract2))
        });
      }

      if (!DATA.length){showError('No programs found.');return;}
      populateFilters();
      render();
    } catch(e){showError(e.message);console.error(e);}
  };
  var s=document.createElement('script');
  s.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=responseHandler:'+cb;
  s.onerror=function(){showError('Could not load Google Sheets.');};
  document.head.appendChild(s);
}

function gv(row,idx){if(idx===undefined||idx<0||!row.c||!row.c[idx])return '';var v=row.c[idx].v;return v?String(v).trim():'';}
function showError(msg){$('list').innerHTML='<div class="error-box"><h3>Error</h3><p>'+msg+'</p></div>';}
function uniq(a){var s={},r=[];for(var i=0;i<a.length;i++){var v=a[i];if(v&&!s[v]){s[v]=1;r.push(v);}}return r.sort();}
function fill(id,opts){var s=$(id);while(s.options.length>1)s.remove(1);for(var i=0;i<opts.length;i++){var o=document.createElement('option');o.value=opts[i];o.textContent=opts[i];s.appendChild(o);}}
function splitTrim(str){var parts=str.split(','),r=[];for(var i=0;i<parts.length;i++){var t=parts[i].trim();if(t)r.push(t);}return r;}

function populateFilters() {
  var levels=[],discs=[],types=[],mainLangs=[],regions=[];
  for (var i=0;i<DATA.length;i++) {
    var x=DATA[i];
    levels.push(x.l); types.push(x.t);
    if (x.reg) regions.push(x.reg);
    var dd=splitTrim(x.d); for(var j=0;j<dd.length;j++) discs.push(dd[j]);
    if (x.mainLang) mainLangs.push(x.mainLang);
  }
  fill('fLevel',uniq(levels));
  fill('fType',uniq(types));
  fill('fRegion',uniq(regions));
  fill('fMainLang',uniq(mainLangs));
  fillMulti('msDiscDrop',uniq(discs),'disc');
}

// When main language changes, show "Also taught in" sub-filter
$('fMainLang').addEventListener('change', function() {
  var wrap=$('langSubWrap'), val=this.value;
  if (val) {
    var adds=[];
    for (var i=0;i<DATA.length;i++) {
      if (DATA[i].mainLang===val && DATA[i].addLang) {
        var al=splitTrim(DATA[i].addLang);
        for (var j=0;j<al.length;j++) adds.push(al[j]);
      }
    }
    var unique=uniq(adds);
    if (unique.length>0) { fill('fAddLang',unique); wrap.classList.add('visible'); }
    else { wrap.classList.remove('visible'); $('fAddLang').value=''; }
  } else { wrap.classList.remove('visible'); $('fAddLang').value=''; }
  render();
});

function getF() {
  return {level:$('fLevel').value,type:$('fType').value,region:$('fRegion').value,q:$('search').value.toLowerCase(),discs:getChecked('disc'),mainLang:$('fMainLang').value,addLang:$('fAddLang').value};
}

function doFilter() {
  var f=getF(),r=[];
  for (var i=0;i<DATA.length;i++) {
    var x=DATA[i];
    if (f.level && x.l!==f.level) continue;
    if (f.type && x.t!==f.type) continue;
    if (f.region && x.reg!==f.region) continue;
    if (f.discs.length>0) {
      var xd=splitTrim(x.d),found=false;
      for(var di=0;di<f.discs.length;di++){if(xd.indexOf(f.discs[di])>=0){found=true;break;}}
      if(!found) continue;
    }
    if (f.mainLang && x.mainLang!==f.mainLang) continue;
    if (f.addLang) { var al=splitTrim(x.addLang); if(al.indexOf(f.addLang)<0) continue; }
    if (f.q && x.n.toLowerCase().indexOf(f.q)<0 && x.u.toLowerCase().indexOf(f.q)<0 && x.desc.toLowerCase().indexOf(f.q)<0) continue;
    r.push(x);
  }
  return r;
}

function fillMulti(cid,opts,name){var c=$(cid),h='';for(var i=0;i<opts.length;i++){var lb=DL[opts[i]]||opts[i];h+='<label><input type="checkbox" name="'+name+'" value="'+opts[i]+'" onchange="onMultiChange(\''+name+'\')"> '+lb+'</label>';}c.innerHTML=h;}
function getChecked(name){var b=document.querySelectorAll('input[name="'+name+'"]:checked'),v=[];for(var i=0;i<b.length;i++)v.push(b[i].value);return v;}
function onMultiChange(name){var v=getChecked(name),lid='msDiscLabel';if(!v.length)$(lid).textContent='All';else if(v.length===1)$(lid).textContent=DL[v[0]]||v[0];else $(lid).textContent=v.length+' selected';render();}
function toggleDrop(id){var d=$(id).querySelector('.multi-dropdown'),o=d.classList.contains('open');var all=document.querySelectorAll('.multi-dropdown');for(var i=0;i<all.length;i++)all[i].classList.remove('open');if(!o)d.classList.add('open');}
document.addEventListener('click',function(e){if(!e.target.closest('.multi-select')){var all=document.querySelectorAll('.multi-dropdown');for(var i=0;i<all.length;i++)all[i].classList.remove('open');}});

function clearAll(){
  var ids=['fLevel','fType','fRegion','fMainLang','fAddLang','search'];
  for(var i=0;i<ids.length;i++)$(ids[i]).value='';
  var boxes=document.querySelectorAll('input[type="checkbox"]');
  for(var i=0;i<boxes.length;i++)boxes[i].checked=false;
  $('msDiscLabel').textContent='All';
  $('langSubWrap').classList.remove('visible');
  exp={};render();
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function buildItIcons(x) {
  var any=x.inter1||x.inter2||x.pract1||x.pract2;
  if(!any) return '';
  var h='<div class="it-icons">';
  if (x.inter2) h+='<span class="it-icon it-icon-inter level-high"><img src="'+IMG_INTER_HIGH+'" alt="Highly Interdisciplinary"><span class="it-tip">Highly Interdisciplinary</span></span>';
  else if (x.inter1) h+='<span class="it-icon it-icon-inter"><img src="'+IMG_INTER+'" alt="Interdisciplinary Overview"><span class="it-tip">Interdisciplinary Overview</span></span>';
  if (x.pract2) h+='<span class="it-icon it-icon-pract level-high"><img src="'+IMG_PRACT_DEEP+'" alt="Deeply Practical"><span class="it-tip">Deeply Practical</span></span>';
  else if (x.pract1) h+='<span class="it-icon it-icon-pract"><img src="'+IMG_PRACT+'" alt="Practical Inputs"><span class="it-tip">Practical Inputs</span></span>';
  h+='</div>';
  return h;
}

function render() {
  var r=doFilter(),f=getF();
  var ac=0;
  if(f.level)ac++;if(f.discs.length)ac++;if(f.type)ac++;if(f.mainLang)ac++;if(f.addLang)ac++;if(f.region)ac++;
  var fa=$('fActions');
  if(ac>0){fa.style.display='flex';$('fCount').textContent=ac+' filter'+(ac>1?'s':'')+' active';}
  else fa.style.display='none';

  $('rCount').textContent=r.length+' program'+(r.length!==1?'s':'')+' found';

  var bh='';
  var lvs=['Bachelor','Bachelor Minor','Master','Weiterbildung'];
  for(var li=0;li<lvs.length;li++){var lv=lvs[li],st=LS[lv],cnt=0;for(var ci=0;ci<r.length;ci++)if(r[ci].l===lv)cnt++;if(cnt)bh+='<span class="badge '+st.b+'">'+lv+': '+cnt+'</span>';}
  $('rBadges').innerHTML=bh;

  if(!r.length){$('list').innerHTML='<div class="empty"><div class="ico">🌱</div><h3>No programs found</h3><p>Try adjusting your filters or search terms</p></div>';return;}

  var html='';
  for(var ri=0;ri<r.length;ri++){
    var x=r[ri],idx=DATA.indexOf(x);
    var s=LS[x.l]||LS.Bachelor;
    var o=!!exp[idx];
    var ds=splitTrim(x.d);
    var isUni=x.t.toLowerCase().indexOf('uni')>=0;
    var tc=isUni?'type-uni':'type-fh';

    var dh='';
    for(var di=0;di<ds.length;di++) dh+='<span class="disc-tag">'+esc(DL[ds[di]]||ds[di])+'</span>';

    var langHtml=esc(x.mainLang);
    if(x.addLang) langHtml+='<span class="tag-lang-add"> + '+esc(x.addLang)+'</span>';

    var itHtml=buildItIcons(x);

    var det='';
    if(o){
      det='<div class="card-details"><p class="card-desc">'+esc(x.desc)+'</p>';
      if(x.p)det+='<div class="card-pract"><span class="card-pract-lbl">Practical Information</span><p>'+esc(x.p)+'</p></div>';
      det+='</div>';
    }

    html+='<div class="program-card" onclick="tog('+idx+')"><div class="card-inner '+s.c+'">'
      +'<div class="card-top"><div class="card-main">'
      +'<h3 class="card-title">'+esc(x.n)+'</h3>'
      +'<div class="card-uni-row"><span class="card-uni">'+esc(x.u)+'</span><span class="type-badge '+tc+'">'+esc(x.t)+'</span></div>'
      +'</div><div class="card-tags">'
      +'<span class="tag-level" style="background:'+s.bg+';color:'+s.fg+'">'+esc(x.l)+'</span>'
      +'<span class="tag-lang">'+langHtml+'</span>'
      +'</div></div>'
      +'<div class="card-bottom-row"><div class="card-discs">'+dh+'</div>'+itHtml+'</div>'
      +det
      +'<div class="card-hint">'+(o?'&#9650; Click to collapse':'&#9660; Click for details')+'</div>'
      +'</div></div>';
  }
  $('list').innerHTML=html;
}

function tog(i){exp[i]=!exp[i];render();}

var selects=document.querySelectorAll('.filter-select');
for(var i=0;i<selects.length;i++) selects[i].addEventListener('change',render);
$('search').addEventListener('input',render);

fetchData();
</script>
</body>
</html>
